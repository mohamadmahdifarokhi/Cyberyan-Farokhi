version: '3.8'

services:
  # MongoDB Database (Development)
  mongodb:
    image: mongo:7
    container_name: vc-did-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: vc_did_db
    volumes:
      - mongodb_dev_data:/data/db
      - ./backend/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - vc-did-network-dev
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # RabbitMQ Message Broker (Development)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vc-did-rabbitmq-dev
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    networks:
      - vc-did-network-dev
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: vc-did-backend-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - HOST=0.0.0.0
    env_file:
      - ./backend/.env.development
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - /app/node_modules
    networks:
      - vc-did-network-dev
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Development - React Native Web/Expo)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vc-did-frontend-dev
    restart: unless-stopped
    ports:
      - "19006:19006"  # Expo web
      - "19000:19000"  # Expo dev tools
      - "19001:19001"  # Expo dev server
      - "8082:8082"    # Metro Bundler (changed from default 8081)
    environment:
      - NODE_ENV=development
      - REACT_NATIVE_PACKAGER_HOSTNAME=0.0.0.0
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - EXPO_METRO_PORT=8082
      - RCT_METRO_PORT=8082
      # Disable output buffering for real-time log streaming
      - PYTHONUNBUFFERED=1
      - NODE_NO_WARNINGS=1
    env_file:
      - ./frontend/.env.development
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/app.json:/app/app.json:delegated
      - ./frontend/assets:/app/assets:delegated
    networks:
      - vc-did-network-dev
    depends_on:
      - backend
    # Configure logging driver for better log management
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Ensure stdout/stderr are not buffered
    stdin_open: true
    tty: true

  # Nginx (Development)
  nginx:
    image: nginx:alpine
    container_name: vc-did-nginx-dev
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - vc-did-network-dev

networks:
  vc-did-network-dev:
    driver: bridge

volumes:
  mongodb_dev_data:
  rabbitmq_dev_data:
